<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Graph Editor (Done + WIP)</title>

    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            background: #0d1117;
            color: white;
            font-family: sans-serif;
        }

        #sidebar {
            width: 320px;
            background: #161b22;
            padding: 15px;
            overflow-y: auto;
            border-right: 1px solid #30363d;
        }

        input, select, button, textarea {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
            background: #0d1117;
            color: white;
            border: 1px solid #30363d;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            background: #21262d;
        }

        .nodeItem {
            padding: 6px;
            margin-bottom: 5px;
            border: 1px solid #30363d;
            cursor: pointer;
        }

        .selected {
            background: #30363d;
        }

        #preview {
            flex: 1;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #output {
            position: absolute;
            bottom: 10px;
            left: 340px;
            right: 10px;
            height: 180px;
            color: #0f0;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div id="sidebar">

        <h3>Create / Edit Node</h3>

        <input id="name" placeholder="Name">
        <input id="color" type="color">
        <input id="site" placeholder="https://... optional">
        <input id="size" type="number" placeholder="Size">

        <select id="type">
            <option value="done">Done Project</option>
            <option value="wip">WIP Project</option>
        </select>

        <input id="links" placeholder="Links (Ctrl+click nodes)">

        <button onclick="addNode()">Add / Update</button>
        <button onclick="deleteNode()">Delete</button>
        <button onclick="sortNodes()">Sort By Size</button>
        <button onclick="loadFromOutput()">Load From Output</button>

        <h3>Nodes</h3>
        <div id="list"></div>
    </div>

    <div id="preview">
        <canvas id="canvas"></canvas>
    </div>

<textarea id="output"></textarea>

    <script>
        let doneNodes = [];
        let wipNodes = [];

        let selected = null;
        let selectedLinks = [];

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        function resize() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        function getAllNodes() {
            return [...doneNodes, ...wipNodes];
        }

        function renderList() {
            const list = document.getElementById("list");
            list.innerHTML = "";

            getAllNodes().forEach(n => {
                const div = document.createElement("div");

                div.className =
                    "nodeItem" + (selected === n ? " selected" : "");

                div.textContent =
                    `${n.name} (${n.type.toUpperCase()})`;

                div.onclick = (e) => {

                    if (e.ctrlKey && selected) {
                        if (!selectedLinks.includes(n.name)) {
                            selectedLinks.push(n.name);
                        }

                        document.getElementById("links").value =
                            selectedLinks.join("-");

                        return;
                    }

                    selected = n;
                    selectedLinks = [...n.links];

                    document.getElementById("name").value = n.name;
                    document.getElementById("color").value = n.color;
                    document.getElementById("site").value = n.site || "";
                    document.getElementById("size").value = n.size || "";
                    document.getElementById("type").value = n.type;
                    document.getElementById("links").value =
                        n.links.join("-");

                    renderList();
                };

                list.appendChild(div);
            });
        }

        function addNode() {
            const node = {
                name: document.getElementById("name").value.trim(),
                color: document.getElementById("color").value,
                site: document.getElementById("site").value.trim(),
                size: Number(document.getElementById("size").value) || 8,
                type: document.getElementById("type").value,
                links: document.getElementById("links")
                    .value
                    .split("-")
                    .filter(x => x)
            };

            if (!node.name) {
                alert("Name required");
                return;
            }

            let all = getAllNodes();
            let existing = all.find(n => n.name === node.name);

            if (existing) {
                Object.assign(existing, node);
            } else {
                if (node.type === "done") {
                    doneNodes.push(node);
                } else {
                    wipNodes.push(node);
                }
            }

            // move between arrays if type changed
            doneNodes = doneNodes.filter(n => n.type === "done");
            wipNodes = wipNodes.filter(n => n.type === "wip");

            renderList();
            generateOutput();
        }

        function deleteNode() {
            if (!selected) return;

            doneNodes = doneNodes.filter(n => n !== selected);
            wipNodes = wipNodes.filter(n => n !== selected);

            selected = null;

            renderList();
            generateOutput();
        }

        function sortNodes() {
            doneNodes.sort((a, b) => b.size - a.size);
            wipNodes.sort((a, b) => b.size - a.size);

            renderList();
            generateOutput();
        }

        function nodeToString(n) {
            let s = `name:${n.name},color:${n.color}`;

            if (n.size) s += `,size:${n.size}`;
            if (n.links.length) s += `,linked:${n.links.join("-")}`;
            if (n.site) s += `,site:${n.site}`;

            return `"${s}"`;
        }

        function generateOutput() {

            const doneOutput = doneNodes
                .map(nodeToString)
                .join(",\n");

            const wipOutput = wipNodes
                .map(nodeToString)
                .join(",\n");

            document.getElementById("output").value =
                `const rawNodes = [
${doneOutput}
];

const wipRawNodes = [
${wipOutput}
];`;

            rebuildGraph();
        }

        function parseNodeString(str, type) {
            let obj = {};

            str.split(",").forEach(part => {
                let i = part.indexOf(":");
                if (i === -1) return;

                obj[
                    part.slice(0, i).trim()
                ] = part.slice(i + 1).trim();
            });

            return {
                name: obj.name,
                color: obj.color || "#fff",
                site: obj.site || "",
                size: Number(obj.size) || 8,
                links: obj.linked ? obj.linked.split("-") : [],
                type: type
            };
        }

        function loadFromOutput() {
            try {
                const text =
                    document.getElementById("output").value;

                const doneMatch =
                    text.match(/const rawNodes = \[([\s\S]*?)\];/);

                const wipMatch =
                    text.match(/const wipRawNodes = \[([\s\S]*?)\];/);

                doneNodes = [];
                wipNodes = [];

                if (doneMatch) {
                    doneNodes = doneMatch[1]
                        .split("\n")
                        .map(x => x.trim()
                            .replace(/,$/, "")
                            .replace(/^"|"$/g, ""))
                        .filter(Boolean)
                        .map(x => parseNodeString(x, "done"));
                }

                if (wipMatch) {
                    wipNodes = wipMatch[1]
                        .split("\n")
                        .map(x => x.trim()
                            .replace(/,$/, "")
                            .replace(/^"|"$/g, ""))
                        .filter(Boolean)
                        .map(x => parseNodeString(x, "wip"));
                }

                selected = null;
                selectedLinks = [];

                renderList();
                generateOutput();

            } catch (err) {
                console.error(err);
                alert("Load failed");
            }
        }

        let graphNodes = [];
        let graphLinks = [];

        function rebuildGraph() {
            graphNodes = getAllNodes().map(n => ({
                ...n,
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: 0,
                vy: 0
            }));

            graphLinks = [];

            graphNodes.forEach(n => {
                n.links.forEach(link => {
                    graphLinks.push([n.name, link]);
                });
            });
        }

        function updateGraph() {

            for (let i = 0; i < graphNodes.length; i++) {
                for (let j = i + 1; j < graphNodes.length; j++) {

                    let a = graphNodes[i];
                    let b = graphNodes[j];

                    let dx = b.x - a.x;
                    let dy = b.y - a.y;

                    let dist = Math.sqrt(dx * dx + dy * dy) || 1;
                    let force = 200 / (dist * dist);

                    a.vx -= force * dx / dist;
                    a.vy -= force * dy / dist;

                    b.vx += force * dx / dist;
                    b.vy += force * dy / dist;
                }
            }

            graphLinks.forEach(([aName, bName]) => {
                let a = graphNodes.find(n => n.name === aName);
                let b = graphNodes.find(n => n.name === bName);

                if (!a || !b) return;

                let dx = b.x - a.x;
                let dy = b.y - a.y;

                let dist = Math.sqrt(dx * dx + dy * dy) || 1;
                let force = (dist - 100) * 0.02;

                a.vx += force * dx / dist;
                a.vy += force * dy / dist;

                b.vx -= force * dx / dist;
                b.vy -= force * dy / dist;
            });

            graphNodes.forEach(n => {
                n.vx *= 0.7;
                n.vy *= 0.7;
                n.x += n.vx;
                n.y += n.vy;
            });
        }

        function drawGraph() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "#555";

            graphLinks.forEach(([aName, bName]) => {
                let a = graphNodes.find(n => n.name === aName);
                let b = graphNodes.find(n => n.name === bName);

                if (!a || !b) return;

                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.stroke();
            });

            graphNodes.forEach(n => {
                ctx.beginPath();
                ctx.arc(n.x, n.y, n.size, 0, Math.PI * 2);

                ctx.fillStyle =
                    n.type === "wip"
                        ? "#ffaa00"
                        : n.color;

                ctx.fill();

                ctx.fillStyle = "white";
                ctx.fillText(
                    n.name,
                    n.x + n.size + 5,
                    n.y
                );
            });
        }

        function loop() {
            updateGraph();
            drawGraph();
            requestAnimationFrame(loop);
        }

        rebuildGraph();
        renderList();
        loop();
    </script>
</body>
</html>
