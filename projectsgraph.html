<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Niko - Project Graph</title>
    <link rel="icon" href="icon.png" type="image/png">
    <style>
        @font-face {
            font-family: 'Minecraft';
            src: url('MinecraftFont.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a0b1f 0%, #0a050f 100%);
            font-family: 'Minecraft', sans-serif;
        }

        canvas {
            display: block;
        }

        #toggleBtn {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            padding: 10px 14px;
            background: #111;
            color: #fff;
            border: 1px dashed #444;
            cursor: pointer;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <button id="toggleBtn">Hide Upcoming</button>
    <canvas id="graph"></canvas>

    <script>
        const canvas = document.getElementById('graph');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
        const baseWidth = 700; 
        function getScale() {
            return Math.min(canvas.width, canvas.height) / baseWidth;
        }





        // ====================================================================================================================================
        const rawNodes = [
            "name:ALL,color:#ffffff,size:25,linked:GAMES-SOFTWARE-REAL LIFE",
            "name:REAL LIFE,color:#e3a9fe,size:17",
            "name:SOFTWARE,color:#a9f0fe,size:15",
            "name:GAMES,color:#6bffc6,size:15",
            "name:Minecraft,color:#188f00,size:10,linked:GAMES",
            "name:Blender,color:#ff7b00,size:10,linked:SOFTWARE",
            "name:Hytale,color:#c8ff00,size:10,linked:GAMES",
            "name:Gmod,color:#00bfff,size:10,linked:GAMES",
            "name:Github,color:#ffffff,size:10,linked:SOFTWARE",
            "name:CurseForge,color:#cc4700,size:7,linked:Minecraft,site:https://www.curseforge.com/members/nikilogout_/projects",
            "name:MinecraftZ Zombie Nebula,color:#ff0000,size:4,linked:CurseForge,site:https://www.curseforge.com/minecraft/modpacks/mcz-official",
            "name:MinecraftW Waifu H,color:#fb00ff,size:4,linked:CurseForge,site:https://www.curseforge.com/minecraft/modpacks/waifu-h",
            "name:nikilogouts MCZ Addions,color:#006b02,size:4,linked:CurseForge-MinecraftZ Zombie Nebula,site:https://www.curseforge.com/minecraft/mc-mods/nikilogouts-mcz-addions",
            "name:Minecraft like Jump Height,color:#b0b300,size:4,linked:Hytale,site:https://www.curseforge.com/hytale/mods/minecraft-like-jump-height",
            "name:Barotrauma Radio,color:#2990ff,size:4,linked:Gmod",
            "name:All of my codes,color:#cb6bff,size:4,linked:Github,site:https://github.com/niki2007/QOL-Codes-Windows-Android",
            "name:Share projects on IG,color:#b35f00,size:4,linked:Blender,site:https://www.instagram.com/nikilogout/"
        ];

        const wipRawNodes = [
            "name:Unity,color:#7a7a7a,size:10,linked:SOFTWARE",
            "name:Rimworld,color:#5e5e5e,size:10,linked:GAMES",
            "name:Barotrauma,color:#00a5a8,size:10,linked:GAMES",
            "name:BDCC,color:#0033ff,size:10,linked:GAMES",
            "name:MinecraftH Horror?,color:#ff2424,size:4,linked:CurseForge",
            "name:MinecraftZ Fast Life,color:#00d68f,size:4,linked:CurseForge",
            "name:MinecraftEFP Escape From Prague,color:#8e5e3e,size:4,linked:CurseForge",
            "name:Lucky Towers Mobile,color:#9429ff,size:4,linked:Unity",
            "name:My own website,color:#ff0066,size:4,linked:Github,site:https://niki2007.github.io/",
            "name:Build a Submarine,color:#005ca3,size:4,linked:Barotrauma",
            "name:2D Zombie Survival,color:#1eff00,size:4,linked:Unity",
            "name:Medium Sized Exploration,color:#6b6b6b,size:4,linked:Unity",
            "name:Totally Normal Mod,color:#916e6e,size:4,linked:CurseForge"
        ];
        // ====================================================================================================================================






        // ======================
        // PARSER
        // ======================
        function parseNode(str) {
            let obj = {};

            str.split(',').forEach(part => {
                let index = part.indexOf(':');
                if (index === -1) return;
                obj[part.slice(0, index).trim()] = part.slice(index + 1).trim();
            });
            const spread = 500 * getScale();
            return {
                id: obj.name,
                color: obj.color || '#7aa2ff',
                site: obj.site || null,
                links: obj.linked ? obj.linked.split('-') : [],
                size: (obj.size ? Number(obj.size) : 8) * getScale(),
                x: canvas.width / 2 + (Math.random() - 0.5) * spread,
                y: canvas.height / 2 + (Math.random() - 0.5) * spread,
                vx: (Math.random() - 0.5) * 0.2,
                vy: (Math.random() - 0.5) * 0.2
            };
        }

        // ======================
        // TWO SEPARATE LISTS
        // ======================
        const doneNodes = rawNodes.map(parseNode);
        const wipNodes = wipRawNodes.map(parseNode);

        // ======================
        // TOGGLE STATE
        // ======================
        let showUpcoming = true;

        document.getElementById('toggleBtn').onclick = () => {
            showUpcoming = !showUpcoming;
            document.getElementById('toggleBtn').textContent =
                showUpcoming ? "Hide Upcoming" : "Show Upcoming";
        };

        // ======================
        // ACTIVE STATE HELPERS
        // ======================
        function getActiveNodes() {
            return showUpcoming ? [...doneNodes, ...wipNodes] : doneNodes;
        }

        function getActiveLinks() {
            if (!showUpcoming) {
                return links.filter(([a, b]) =>
                    doneNodes.some(n => n.id === a) &&
                    doneNodes.some(n => n.id === b)
                );
            }
            return links;
        }

        // ======================
        // LINKS
        // ======================
        const links = [];

        [...doneNodes, ...wipNodes].forEach(n => {
            n.links.forEach(target => {
                links.push([n.id, target]);
            });
        });

        function getNode(id) {
            return getActiveNodes().find(n => n.id === id);
        }

        // ======================
        // PHYSICS
        // ======================
        const springStrength = 0.02;
        const repulsion = 200;
        const damping = 0.7;

        function update() {
            const nodes = getActiveNodes();

            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    let a = nodes[i];
                    let b = nodes[j];

                    let dx = b.x - a.x;
                    let dy = b.y - a.y;
                    let dist = Math.sqrt(dx * dx + dy * dy) || 1;

                    let force = repulsion / (dist * dist);
                    let fx = force * dx / dist;
                    let fy = force * dy / dist;

                    a.vx -= fx;
                    a.vy -= fy;
                    b.vx += fx;
                    b.vy += fy;
                }
            }

            links.forEach(([aId, bId]) => {
                let nodes = getActiveNodes();
                let a = nodes.find(n => n.id === aId);
                let b = nodes.find(n => n.id === bId);
                if (!a || !b) return;

                let dx = b.x - a.x;
                let dy = b.y - a.y;
                let dist = Math.sqrt(dx * dx + dy * dy) || 1;

                let springLength = (a.size + b.size) * 5;
                let force = (dist - springLength) * springStrength;

                let fx = force * dx / dist;
                let fy = force * dy / dist;

                a.vx += fx;
                a.vy += fy;
                b.vx -= fx;
                b.vy -= fy;
            });

            nodes.forEach(n => {
                if (n === dragged) return;

                n.vx *= damping;
                n.vy *= damping;
                n.x += n.vx;
                n.y += n.vy;
            });
        }

        // ======================
        // STARS
        // ======================
        const stars = Array.from({ length: 140 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 1.5,
            speed: Math.random() * 0.3 + 0.1
        }));

        function drawStars() {
            stars.forEach(s => {
                ctx.fillStyle = Math.random() > 0.5 ? '#ff9cfb' : '#ffd6f9';
                ctx.globalAlpha = 0.5;
                ctx.fillRect(s.x, s.y, s.size, s.size);

                s.y += s.speed;
                if (s.y > canvas.height) {
                    s.y = 0;
                    s.x = Math.random() * canvas.width;
                }
            });
            ctx.globalAlpha = 1;
        }

        // ======================
        // INTERACTION
        // ======================
        let dragged = null;
        let mouseDownNode = null;
        let isDragging = false;
        let hovered = null;

        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            dragged = null;
            mouseDownNode = null;
            isDragging = false;

            for (let n of getActiveNodes()) {
                let dx = mx - n.x;
                let dy = my - n.y;
                if (Math.sqrt(dx * dx + dy * dy) < n.size + 5) {
                    dragged = n;
                    mouseDownNode = n;
                    break;
                }
            }
        });

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            hovered = null;

            for (let n of getActiveNodes()) {
                let dx = mx - n.x;
                let dy = my - n.y;
                if (Math.sqrt(dx * dx + dy * dy) < n.size + 5) {
                    hovered = n;
                    break;
                }
            }

            if (dragged) {
                isDragging = true;
                dragged.x = mx;
                dragged.y = my;
                dragged.vx = 0;
                dragged.vy = 0;
            }
        });

        canvas.addEventListener('mouseup', () => {
            if (!isDragging && mouseDownNode && mouseDownNode.site) {
                window.open(mouseDownNode.site, '_blank');
            }

            dragged = null;
            mouseDownNode = null;
        });

        // ======================
        // MOBILE TOUCH SUPPORT
        // ======================
        canvas.addEventListener('touchstart', e => {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];

            const mx = touch.clientX - rect.left;
            const my = touch.clientY - rect.top;

            dragged = null;
            mouseDownNode = null;
            isDragging = false;

            for (let n of getActiveNodes()) {
                let dx = mx - n.x;
                let dy = my - n.y;
                if (Math.sqrt(dx * dx + dy * dy) < n.size + 10) { 
                    dragged = n;
                    mouseDownNode = n;
                    break;
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];

            const mx = touch.clientX - rect.left;
            const my = touch.clientY - rect.top;

            hovered = null;

            for (let n of getActiveNodes()) {
                let dx = mx - n.x;
                let dy = my - n.y;
                if (Math.sqrt(dx * dx + dy * dy) < n.size + 10) {
                    hovered = n;
                    break;
                }
            }

            if (dragged) {
                isDragging = true;
                dragged.x = mx;
                dragged.y = my;
                dragged.vx = 0;
                dragged.vy = 0;
            }

            e.preventDefault(); 
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            if (!isDragging && mouseDownNode && mouseDownNode.site) {
                window.open(mouseDownNode.site, '_blank');
            }

            dragged = null;
            mouseDownNode = null;
        });

        // ======================
        // DRAW
        // ======================
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawStars();

            const nodes = getActiveNodes();

            ctx.strokeStyle = '#666';
            links.forEach(([aId, bId]) => {
                let a = nodes.find(n => n.id === aId);
                let b = nodes.find(n => n.id === bId);
                if (!a || !b) return;

                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.stroke();
            });

            nodes.forEach(n => {
                ctx.beginPath();
                ctx.arc(n.x, n.y, n.size, 0, Math.PI * 2);
                ctx.fillStyle = n.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = n.color;
                ctx.fill();
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#fff';
                ctx.font = `${12 * getScale()}px Minecraft`;
                ctx.fillText(n.id, n.x + n.size + 6, n.y + 4);
            });

            if (hovered && hovered.site) {
                ctx.fillStyle = '#fff';
                ctx.fillText(hovered.site, hovered.x + 15, hovered.y - 10);
            }
        }

        // ======================
        // LOOP
        // ======================
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>

</body>
</html>
